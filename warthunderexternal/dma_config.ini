# DMA secondary machine configuration
[device]
device=fpga

[overlay]
# align: capture = track preview window | manual = fixed position below
align=capture
# Substring of your capture preview window title (OBS, PotPlayer, 采集卡软件等).
# Example: capture_window=OBS  or  capture_window=预览
capture_window=
# Auto-find OBS/PotPlayer/采集 preview when capture_window is empty.
auto_capture=1
# 1 = match client area (recommended), 0 = match outer window frame
use_client_rect=1
# manual mode only:
overlay_x=0
overlay_y=0
overlay_width=1920
overlay_height=1080

[kmbox]
# Required for aimbot on DMA machine (controls mouse on the game PC).
enabled=0
ip=192.168.2.188
port=8808
uuid=00000000