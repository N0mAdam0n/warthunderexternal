# DMA secondary machine configuration
[dma]
folder=dma
device=fpga
target_process=aces.exe
disable_refresh=1

[overlay]
# align: foreground (track focused window) | capture (match title) | manual (fixed x/y/w/h)
align=foreground
# Example for OBS/PotPlayer: capture_window=OBS
capture_window=
use_client_rect=1
overlay_x=0
overlay_y=0
overlay_width=1920
overlay_height=1080

[kmbox]
enabled=0
ip=192.168.2.188
port=8808
uuid=00000000